<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Digital ID Portal</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; min-width: 300px; }
        input { padding: 10px; width: 200px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; }
        img { margin-top: 15px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h1>Student Portal</h1>
    <p>Enter your Student ID to generate your Digital ID</p>

    <input type="text" id="studentId" placeholder="e.g. 12345">
    <button onclick="generateID()">Generate</button>

    <div id="result">
        <h3 id="displayName"></h3>
        <p id="displayMajor"></p>
        <img id="qrCode" style="display:none;" alt="QR Code">
    </div>
</div>

<script>
    async function generateID() {
        const id = document.getElementById('studentId').value;
        if (!id) return alert("Please enter an ID");

        // 1. Fetch Student Data from your API
        const response = await fetch(`/api/student/${id}`);

        if (response.status === 200) {
            const student = await response.json();


            document.getElementById('displayName').innerText = student.name;
            document.getElementById('displayMajor').innerText = "Major: " + student.major;


            const qrImg = document.getElementById('qrCode');
            qrImg.src = `/generate-id?sid=${id}`;
            qrImg.style.display = 'inline-block';
        } else {
            alert("Student not found!");
        }
    }
</script>
</body>
</html>
